<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240">
  <style>rect{fill:#f6f9ff;stroke:#2b6cb0;stroke-width:2;} .label{font:14px Arial, Helvetica, sans-serif;fill:#102a43}</style>
  <rect x="20" y="20" width="180" height="48" rx="6"/>
  <text x="30" y="50" class="label">Browser: ?viewer=cama/{town}</text>

  <rect x="230" y="20" width="220" height="48" rx="6"/>
  <text x="240" y="50" class="label">Load JSON configuration</text>

  <rect x="480" y="20" width="200" height="48" rx="6"/>
  <text x="490" y="50" class="label">Validate & resolve assets</text>

  <rect x="690" y="20" width="180" height="48" rx="6"/>
  <text x="700" y="50" class="label">Initialize WebMap / MapView</text>

  <rect x="230" y="120" width="420" height="48" rx="6"/>
  <text x="240" y="150" class="label">Load parcel layers & populate filters</text>

  <rect x="230" y="180" width="220" height="36" rx="6"/>
  <text x="240" y="205" class="label">UI ready — interactions enabled</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0" />
    </marker>
  </defs>

  <line x1="200" y1="44" x2="230" y2="44" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="450" y1="44" x2="480" y2="44" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="680" y1="44" x2="690" y2="44" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="790" y1="68" x2="440" y2="120" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="440" y1="168" x2="440" y2="180" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)" />
</svg>